<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#564b40"/>
      <stop offset="100%" stop-color="#6b5b4b"/>
    </linearGradient>
    <pattern id="grid" width="33" height="33" patternUnits="userSpaceOnUse">
      <path d="M 33 0 L 0 0 0 33" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="700" height="500" fill="url(#bg)"/>
  <g opacity="0.06">
    <line x1="0" y1="500" x2="700" y2="0" stroke="#f0ece3" stroke-width="5"/>
    <line x1="0" y1="400" x2="560" y2="0" stroke="#f0ece3" stroke-width="2"/>
    <line x1="140" y1="500" x2="700" y2="100" stroke="#f0ece3" stroke-width="2"/>
  </g>
  <rect width="700" height="500" fill="url(#grid)"/>
  <rect x="0" y="0" width="700" height="2" fill="#6b5b4b" opacity="0.3"/>
  <g opacity="0.07">
    <circle cx="350" cy="200" r="150" fill="none" stroke="#f0ece3" stroke-width="1"/>
    <rect x="250" y="100" width="200" height="200" fill="none" stroke="#f0ece3" stroke-width="1" transform="rotate(45 350 200)"/>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="350" y="290" font-size="47" font-weight="300" letter-spacing="0.05em" fill="rgba(255,255,255,0.85)">Journal</text>
    <text x="350" y="460" font-size="12" font-weight="400" letter-spacing="0.15em" fill="rgba(255,255,255,0.25)">AURA ESTATES</text>
  </g>
  <rect x="0" y="498" width="700" height="2" fill="#6b5b4b" opacity="0.15"/>
