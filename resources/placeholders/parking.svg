<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#564b40"/>
      <stop offset="100%" stop-color="#6b5b4b"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <g opacity="0.06">
    <line x1="0" y1="300" x2="400" y2="0" stroke="#f0ece3" stroke-width="3"/>
    <line x1="0" y1="240" x2="320" y2="0" stroke="#f0ece3" stroke-width="2"/>
    <line x1="80" y1="300" x2="400" y2="60" stroke="#f0ece3" stroke-width="2"/>
  </g>
  <rect width="400" height="300" fill="url(#grid)"/>
  <rect x="0" y="0" width="400" height="2" fill="#6b5b4b" opacity="0.3"/>
  <g opacity="0.07">
    <circle cx="200" cy="120" r="90" fill="none" stroke="#f0ece3" stroke-width="1"/>
    <rect x="140" y="60" width="120" height="120" fill="none" stroke="#f0ece3" stroke-width="1" transform="rotate(45 200 120)"/>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="200" y="174" font-size="27" font-weight="300" letter-spacing="0.05em" fill="rgba(255,255,255,0.85)">Secure Parking</text>
    <text x="200" y="276" font-size="9" font-weight="400" letter-spacing="0.15em" fill="rgba(255,255,255,0.25)">AURA ESTATES</text>
  </g>
  <rect x="0" y="298" width="400" height="2" fill="#6b5b4b" opacity="0.15"/>
</svg>