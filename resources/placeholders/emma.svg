<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#564b40"/>
      <stop offset="100%" stop-color="#6b5b4b"/>
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <g opacity="0.06">
    <line x1="0" y1="100" x2="100" y2="0" stroke="#f0ece3" stroke-width="2"/>
    <line x1="0" y1="80" x2="80" y2="0" stroke="#f0ece3" stroke-width="1"/>
    <line x1="20" y1="100" x2="100" y2="20" stroke="#f0ece3" stroke-width="1"/>
  </g>
  <rect width="100" height="100" fill="url(#grid)"/>
  <rect x="0" y="0" width="100" height="2" fill="#6b5b4b" opacity="0.3"/>
  <g opacity="0.07">
    <circle cx="50" cy="40" r="30" fill="none" stroke="#f0ece3" stroke-width="1"/>
    <rect x="30" y="20" width="40" height="40" fill="none" stroke="#f0ece3" stroke-width="1" transform="rotate(45 50 40)"/>
  </g>
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="50" y="58" font-size="14" font-weight="300" letter-spacing="0.05em" fill="rgba(255,255,255,0.85)">EH</text>
    <text x="50" y="92" font-size="9" font-weight="400" letter-spacing="0.15em" fill="rgba(255,255,255,0.25)">AURA ESTATES</text>
  </g>
  <rect x="0" y="98" width="100" height="2" fill="#6b5b4b" opacity="0.15"/>
</svg>