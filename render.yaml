services:
  - type: web
    name: aura-estates
    runtime: docker
    dockerfilePath: Dockerfile
    healthCheckPath: /
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: aura-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: aura-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: aura-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aura-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: aura-db
          property: port
      - key: SMTP_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: APP_URL
        value: https://aura-estates.onrender.com

databases:
  - name: aura-db
    plan: free
    databaseName: aura_estates
    user: aura_estates
